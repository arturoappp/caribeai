<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35D6E7"/>
      <stop offset="100%" stop-color="#1FBCC9"/>
    </linearGradient>
  </defs>

  <!-- Outer Hexagon -->
  <polygon points="512,270 690,336 690,608 512,754 334,608 334,336"
           fill="url(#grad)"/>

  <!-- Inner White Structure -->
  <polygon points="512,318 646,365 646,590 512,700 378,590 378,365"
           fill="none" stroke="white" stroke-width="18" stroke-linejoin="round"/>

  <!-- Vertical Divider -->
  <line x1="512" y1="318" x2="512" y2="700"
        stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Diagonal Divider -->
  <line x1="512" y1="500" x2="646" y2="425"
        stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Left lower angled section -->
  <line x1="378" y1="500" x2="512" y2="425"
        stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Network Icon -->
  <g transform="translate(398,398)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#2CBCC8" stroke-width="5"/>

    <!-- Connections -->
    <line x1="0" y1="0" x2="-45" y2="-28" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="-12" y2="-58" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="35" y2="-65" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="58" y2="-10" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="45" y2="42" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="-5" y2="58" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="-38" y2="40" stroke="#2CBCC8" stroke-width="4"/>
    <line x1="0" y1="0" x2="-62" y2="12" stroke="#2CBCC8" stroke-width="4"/>

    <!-- Nodes -->
    <circle cx="-45" cy="-28" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="-12" cy="-58" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="35" cy="-65" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="58" cy="-10" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="45" cy="42" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="-5" cy="58" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="-38" cy="40" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
    <circle cx="-62" cy="12" r="8" fill="white" stroke="#2CBCC8" stroke-width="4"/>
